publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Backend & Auth
  supabase_flutter: ^2.12.4

  # Navigation
  go_router: ^14.8.1

  # State Management (MVVM)
  provider: ^6.1.5

  # Typographie
  google_fonts: ^6.2.1

  # Internationalisation / Dates
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
